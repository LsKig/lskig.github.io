    headers: ["Растение", "Редк", "1к20"]
    short_headers: ["Растение", "Р", "1к20"]
    rows:
      - ["Птичий след", "Н", "1-13"]
      - ["Кога", "Н", "14-17"]
      - ["Нулимс", "Р", "18-20"]

  herbs_forest:
