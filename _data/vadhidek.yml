# Маппинг элементов к травам для алхимии
alchemy_elements:
  Н:
    name: "Начало"
    property: "Лечебные свойства"
    herbs: ["herb_kasun", "herb_alta_tymy", "herb_mokrets", "herb_baldyrgan"]
  К:
    name: "Конец"
    property: "Негативные свойства"
    herbs: ["herb_sporysh", "herb_nullims", "herb_jatash", "herb_shulims", "herb_baldyrgan"]
  Р:
    name: "Рост"
    property: "Стимуляция/Отравление"
    herbs: ["herb_nullims", "herb_shormos", "herb_buuldu", "herb_jatash", "herb_mokrets", "herb_shulims"]
  М:
    name: "Материя"
    property: "Духовная сила"
    herbs: ["herb_nullims", "herb_molodilo", "herb_mokrets", "herb_shulims", "herb_baldyrgan"]

gathering_tables:
