      - ["Единица золота", "Обработка", "Ювелира", "12", "4"]
      - ["Единица серебра", "Обработка", "Ювелира", "14", "2"]
      - ["Единица аянга", "Обработка", "Ювелира", "16", "1"]
      - ["Единица шулая", "Обработка", "Ювелира", "16", "1"]
      - ["Единица насаха", "Переплавка", "Кузнеца", "18", "1"]

  hiyal_bones:
