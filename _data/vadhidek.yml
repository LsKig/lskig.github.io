    headers: ["Результат проверки", "Количество костей"]
    short_headers: ["Проверка", "Костей"]
    rows:
      - ["10-12", "2"]
      - ["13-15", "4"]
      - ["16-18", "6"]
      - ["19-22", "8"]
      - ["23+", "10"]

  herbs_plains:
    name: "Растения на равнинах"
    headers: ["Растение", "Редк", "1к20"]
    short_headers: ["Растение", "Р", "1к20"]
    rows:
      - ["Спорыш", "О", "1-5"]
      - ["Шормос", "О", "6-10"]
      - ["Буулду", "О", "11-15"]
      - ["Аракадский хвост", "Н", "16-20"]

  herbs_swamp:
