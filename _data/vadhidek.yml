    headers: ["Размер", "Мясо", "10-12", "13-15", "16-18", "19-22", "23+", "Время"]
    short_headers: ["Разм", "Мясо", "10-12", "13-15", "16-18", "19-22", "23+", "Время"]
    rows:
      - ["Крошечный", "–", "–", "–", "1 малый", "2 малых", "3 малых", "15 мин."]
      - ["Маленький", "1", "–", "–", "1 малый", "2 малых", "3 малых", "30 мин."]
      - ["Средний", "4", "–", "1 малый", "1 малый 1 средний", "2 малых 1 средний", "2 малых 2 средних", "1 час"]
      - ["Большой", "8", "1 малый", "1 малый 1 средний", "1 малый 1 средний 1 крупный", "2 малых 1 средний 1 крупный", "2 малых 2 средних 1 крупный", "2 часа"]
      - ["Огромный", "16", "1 малый 1 средний", "2 малых 2 средних 1 крупный", "3 малых 2 средних 2 крупных", "3 малых 3 средних 2 крупных", "4 малых 4 средних 3 крупных", "4 часа"]
      - ["Громадный", "32", "1 малый 1 средний 1 крупный", "4 малых 4 средних 2 крупных", "6 малых 4 средних 4 крупных", "6 малых 6 средних 4 крупных", "8 малых 8 средних 6 крупных", "8 часов"]
# === ШАХТЁРСТВО ===
  vein_iron_copper:
    name: "Добыча железа и меди из жилы"
    headers: ["Объём жилы", "1к20", "Макс. проверок", "Фунтов за успех"]
    short_headers: ["Жила", "1к20", "Проверок", "Фунтов"]
    rows:
      - ["Скудная", "1-10", "1", "1к4"]
      - ["Обильная", "11-17", "3", "2к4+2"]
      - ["Богатая", "18-20", "5", "3к4+2"]

  vein_gold_silver:
    name: "Добыча золота и серебра из жилы"
    headers: ["Объём жилы", "1к20", "Макс. проверок", "Фунтов за успех"]
    short_headers: ["Жила", "1к20", "Проверок", "Фунтов"]
    rows:
      - ["Скудная", "1-10", "1", "1к4"]
      - ["Обильная", "11-17", "2", "1к4+2"]
      - ["Богатая", "18-20", "4", "2к4+2"]

  vein_ayang_shulay:
    name: "Добыча аянга и шулая из жилы"
    headers: ["Объём жилы", "1к20", "Макс. проверок", "Фунтов за успех"]
    short_headers: ["Жила", "1к20", "Проверок", "Фунтов"]
    rows:
      - ["Скудная", "1-10", "1", "1к4"]
      - ["Обильная", "11-17", "2", "1к4+1"]
      - ["Богатая", "18-20", "4", "2к4+1"]

  vein_nasakh:
