dramatic_situations:
  title: "Драматические ситуации"
  1:
    name: "МОЛИТВА"
    rolls:
      1: "Просящий умоляет о пощаде"
      2: "Просящий физически унижается перед тем, у кого просит"
      3: "В отчаянной ситуации Просящий просит о снисхождении"
      4: "Просящий признает свою вину перед тем, у кого просит"
      5: "Просящий отдает себя во власть того, у кого просит"
  2:
    name: "СПАСЕНИЕ"
    rolls:
      1: "Спаситель физически извлекает спасаемого из ловушки"
      2: "Спаситель жертвует чем-то ценным ради освобождения спасаемого"
      3: "Спаситель обманывает угрозу, чтобы помочь спасаемому"
      4: "Спаситель принимает удар/опасность на себя, защищая спасаемого"
      5: "Спаситель дает спасаемому средство/знание для самостоятельного освобождения"
      6: "Спаситель разрушает источник неволи или опасности."
  3:
    name: "ПРЕСТУПЛЕНИЕ И МЕСТЬ ЗА НЕГО"
    rolls:
      1: "Мститель физически наказывает преступника."
      2: "Мститель лишает преступника чего-то ценного."
      3: "Мститель публично унижает преступника"
      4: "Мститель заставляет преступника пережить то же, что и жертва "
      5: "Преступнику мстят родные жертвы"
      6: "Мститель неустанно преследует преступника до полного уничтожения"
  4:
    name: "МЕСТЬ ЗА РОДНЫХ ИЛИ РОДИНУ"
    rolls:
      1: "Мститель физически вредит родственнику виновного."
      2: "Мститель отнимает ресурсы у семьи виновного."
      3: "Мститель мстит родичу по законам стаи/племени."
      4: "Мститель бьет по беззащитным членам семьи виновного."
      5: "Мститель ошибочно мстит родне виновного."
      6: "Мститель уничтожает наследие или будущее рода виновного."
  5:
    name: "ПРЕСЛЕДОВАНИЕ"
    rolls:
      1: "Преследователь гонится, чтобы наказать."
      2: "Преследователь исполняет свой долг или приказ."
      3: "Преследователь гонится, чтобы нейтрализовать исходящую угрозу."
      4: "Преследователь гонится, чтобы вернуть отнятое."
      5: "Преследователь гонится, чтобы сломить беглеца."
      6: "Преследователь гонится, как хищник за добычей"
  6:
    name: "БЕДА/КАТАСТРОФА"
    rolls:
      1: "Безопасное пространство становится смертельной ловушкой."
      2: "Герои бегут от настигающей стихии"
      3: "Среда лишает жизненных ресурсов."
      4: "Опасность не видна, но она массовая."
      5: "Внешняя угроза вторгается в привычный уклад."
  7:
    name: "ЖЕРТВА ЖЕСТОКОСТИ ИЛИ НЕСЧАСТНОГО СЛУЧАЯ"
    rolls:
      1: "Жертва страдает от целенаправленной жестокости."
      2: "Жертва страдает от равнодушия окружающих."
      3: "Жертва страдает от случайного стечения обстоятельств."
      4: "Жертва страдает от несправедливости системы."
      5: "Жертва страдает от предательства близкого."
      6: "Жертва страдает от собственной слабости или ошибки."
  8:
    name: "ВОССТАНИЕ"
    rolls:
      1: "Угнетенные силой свергают правителя."
      2: "Слабые отказываются подчиняться системе."
      3: "Подчиненные разрушают идеологию власти."
      4: "Ближний круг свергает лидера."
      5: "Множество саботирует законы тирана."
      6: "Угнетенные молчаливо игнорируют власть."
  9:
    name: "СМЕЛОЕ ПРЕДПРИЯТИЕ"
    rolls:
      1: "Герой бросает вызов непреодолимой силе."
      2: "Герой нарушает запрет для благой цели."
      3: "Герой ломает свою систему/быт, рискуя своим состоянием."
      4: "Герой нарушает запрет ради личной выгоды."
      5: "Герой рискует ради карьеры."
  10:
    name: "ПОХИЩЕНИЕ"
    rolls:
      1: "Похититель силой похищает жертву."
      2: "Похититель обманом уводит жертву."
      3: "Похититель изображает защитника жертвы."
      4: "Похититель крадет статус жертвы."
      5: "Похититель крадет личность жертвы."







