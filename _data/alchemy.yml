symbols:
  KPR:
    name: Купорос
    image: kpr.png
    ingredients:
    - Плод Балисы(О)
    - Ячмень(О)
    - Calcium Equum(О)
    - Вороний глаз(Р)
    - Коготь гуля(У)
    - Зубы Накера(Р)
    - Грибы-шибальцы(Р)
    - Шкура тролля(У)
    - Лепестки белого мирта(О)
  RBS:
    name: Ребис
    image: rbs.png
