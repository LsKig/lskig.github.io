effects:
  bleeding:
    name: Кровотечение
    damage_per_turn: 2
    description: "2 урона в ход. Снятие: исцеляющее заклинание или Первая помощь со СЛ 15."

  poison:
    name: Отравление
    damage_per_turn: 3
    ignore_armor: true
    description: "3 урона в ход (не снижается бронёй). Снятие: проверка Устойчивости со СЛ 15."

  burning:
    name: Горение
    damage_per_turn: 5
    description: "5 урона по каждой части тела в ход. Броня поглощает, но огонь наносит 1 урон броне."

  disorienting:
    name: Дизориентация
    damage_per_turn: 0
    description: "Не может действовать. Попасть по нему: проверка со СЛ 10. Снятие: испытание Устойчивости (1 ход) или получение урона."

  freezing:
    name: Замораживание
    damage_per_turn: 0
    description: "Штраф -3 к Скор, -1 к Реа. Снятие: проверка Силы со СЛ 16 (1 действие)."

  stunning:
    name: Ошеломление
    damage_per_turn: 0
    description: "Штраф -2 к атаке и защите. Снятие: Проходит к началу следующего хода."

  intoxicating:
    name: Опьянение
    damage_per_turn: 0
    description: "Штраф -2 к Реа, Лвк, Инт; -3 в Словесной дуэли. 25% шанс забыть события. Снятие: Сон или Cлезы Жен."

  hallucinating:
    name: Галлюцинации
    damage_per_turn: 0
    description: "Видит нереальные вещи. Отличие от реальности: проверка Дедукции со СЛ 15."

  nausea:
    name: Тошнота
    damage_per_turn: 0
    description: "Каждые 3 раунда бросок 1d10 < Тел. При провале -  рвота/позывы. Снятие: проходит в конце раунда."

  suffocating:
    name: Удушье
    damage_per_turn: 3
    ignore_armor: true
    description: "3 урона в раунд (не снижается бронёй). Снятие: восстановление доступа к воздуху."

  blinding:
    name: Слепота
    damage_per_turn: 0
    description: "Штраф -3 к атакам и защите, -5 к проверкам Внимания (зрение). Снятие**: 1 ход на восстановление зрения."

  knocking_off:
    name: Сбит с ног
    damage_per_turn: 0
    description: "-2 к проверкам атаки и защиты. Снятие: Половина движения на то чтобы подняться"







