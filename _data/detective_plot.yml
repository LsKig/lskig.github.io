config:
  default_dice_count: 11
  default_die_type: 10

tables:
  central_conflicts:
    title: "Центральные конфликты"
    faces:
      1:
        name: "КРАЖА"
        counts:
          2: "Мелкая, незначительная кража"
          3: "Предмет, очень дорогой чьему-то сердцу"
          4: "Тщательно спланированное похищение чего-то очень ценного"
          5: "Ограбление банка"
      2:
        name: "ПРЕСЛЕДОВАНИЕ"
        counts:
          2: "Навязчивое ухаживание, тот вид поведения, который кажется забавным в романтической комедии, но выглядит несколько пугающе в прочих обстоятельствах"
          3: "Выслеживание. Сталкинг, анонимное преследование и подглядывание"
          4: "Шантаж"
          5: "Изощрённые (и искренние) угрозы убийством. Возможно, с подбрасыванием реквизита"
      3:
        name: "ПРЕСТУПЛЕНИЯ ПРОТИВ СОБСТВЕННОСТИ"
        counts:
          2: "Мелкий вандализм"
          3: "Уничтожение чего-то ценного"
          4: "Масштабная порча, уродование или загрязнение чего-нибудь вроде яхты, дома или участка земли. Или, если хотите, бунт"
          5: "Множественные поджоги"
      4:
        name: "ХАЛАТНОСТЬ"
        counts:
          2: "Кто-то по неосторожности обрёк себя на унижение или потерю репутации"
          3: "Халатность привела к не слишком серьёзным, но широко заметным последствиям: неопасной болезни, неприятному запаху из канализации, поломке машин, и т.п. Никакого риска для жизни"
          4: "Непоправимый ущерб, тяжёлая травма"
          5: "Кто-то погиб из-за чужой ошибки и безответственности"
      5:
        name: "РАЗВОД"
        counts:
          2: "Неопределённость с разделом имущества"
          3: "Вопросы опекунства и родительских прав"
          4: "Одна из сторон (или обе) предъявляет серьёзные обвинения: пьянство, домашнее насилие и т. п."
          5: "Под угрозой богатство, слава; а также все прочие результаты x5"
      6:
        name: "ДЕЛОВЫЕ РАЗНОГЛАСИЯ"
        counts:
          2: "Обвинения в подделке документов"
          3: "Подозрительное завещание"
          4: "Расплывчатая формулировка в важном документе"
          5: "Международная сделка на много миллионов долларов висит на волоске"
      7:
        name: "ГОСУДАРСТВЕННЫЕ СТРУКТУРЫ"
        counts:
          2: "Полицейский произвол"
          3: "«Откаты»"
          4: "Взятки"
          5: "Обвинение в коррупционном назначении"
      8:
        name: "МОШЕННИЧЕСТВО"
        counts:
          2: "Мелкое жульничество – разовый обман, призванный заставить жертву расстаться с тем, что сейчас при ней"
          3: "Самозванство"
          4: "Присвоение имущества"
          5: "Длительная, спланированная афёра, призванная обчистить до нитки несколько человек"
      9:
        name: "НАПАДЕНИЕ"
        counts:
          2: "Кто-то ввязался в драку"
          3: "Нападение с оружием – кто-то выхватил пистолет или нож"
          4: "Нападение с целью убийства – раздался выстрел или было нанесено серьёзное ранение"
          5: "Нанесение увечий"
      10:
        name: "УБИЙСТВО"
        counts:
          2: "Непредумышленное убийство"
          3: "Убийство в состоянии аффекта"
          4: "Хладнокровное, подготовленное убийство"
          5: "Извращённые, маниакальные действия. Не просто убийство, но также расчленение, надругательство над трупом, каннибализм, некрофилия и тому подобное"

  complications:
    title: "Подробности и осложнения"
    faces:
      1: "Свидетельства превышения полномочий, например со стороны полицейского, работника морга или лесничего"
      2: "Попытка «подставить» кого-то или сфабриковать улики"
      3: "Сумасшествие"
      4: "Пагубное пристрастие"
      5: "Ключевой свидетель, не желающий разговаривать"
      6: "Изобличительные (на первый взгляд) вещественные доказательства"
      7: "Необыкновенно юный, наивный или неопытный подозреваемый"
      8: "Страстное и убедительное свидетельство в суде"
      9: "Супружеская измена"
      10: "Каким-либо образом затронута личная тайна персонажа игрока"